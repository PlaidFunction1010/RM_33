<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>方紋衫數學 2.0 | RunningMath_33</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        :root { 
            --sidebar-width: 320px; 
            --primary-bg: #1a1a1a;
            --accent-color: #3498db; 
            --card-bg: #ffffff;
        }

        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            margin: 0; display: flex; height: 100vh; background-color: #f4f7f6;
            -webkit-user-select: none; user-select: none;
        }

        #sidebar { width: var(--sidebar-width); background: var(--primary-bg); color: white; display: flex; flex-direction: column; overflow: hidden; box-shadow: 4px 0 15px rgba(0,0,0,0.3); }
        .sidebar-header { padding: 35px 25px; text-align: center; border-bottom: 1px solid #333; cursor: pointer; background: linear-gradient(to bottom, #222, #1a1a1a); }
        .sidebar-header h2 { margin: 0; font-size: 1.3rem; color: var(--accent-color); letter-spacing: 1px; }

        .unit-list { flex-grow: 1; overflow-y: auto; }
        .unit-group { border-bottom: 1px solid #222; }
        .unit-title { padding: 18px 25px; cursor: pointer; display: flex; justify-content: space-between; transition: 0.3s; color: #eee; font-weight: 500; }
        .unit-title:hover { background: #222; }
        .sub-item-list { display: none; background: #0b0b0b; padding: 5px 0; }
        .sub-item { padding: 12px 45px; font-size: 0.9rem; color: #777; cursor: pointer; transition: 0.2s; border-left: 3px solid transparent; }
        .sub-item:hover { color: var(--accent-color); background: #111; border-left: 3px solid var(--accent-color); }

        #main-content { flex-grow: 1; padding: 50px; overflow-y: auto; scroll-behavior: smooth; }
        .section-title { font-size: 1.6rem; margin-bottom: 30px; border-left: 6px solid var(--accent-color); padding-left: 18px; color: #2c3e50; font-weight: 700; }

        .card { background: var(--card-bg); padding: 35px; border-radius: 18px; box-shadow: 0 10px 40px rgba(0,0,0,0.04); margin-bottom: 35px; border: 1px solid #eee; }
        .problem-img { width: 100%; max-height: 450px; object-fit: contain; margin-bottom: 25px; border-radius: 12px; }
        
        /* 專注模式 UI */
        #focus-timer-box { position: fixed; top: 25px; right: 25px; background: #fff; padding: 12px 25px; border-radius: 50px; box-shadow: 0 8px 25px rgba(0,0,0,0.1); display: flex; align-items: center; gap: 15px; z-index: 1000; border: 2px solid var(--accent-color); }
        .timer-val { font-family: monospace; font-size: 1.4rem; font-weight: bold; color: #333; }
        .btn-focus { background: var(--accent-color); color: white; border: none; padding: 10px 20px; border-radius: 25px; cursor: pointer; font-weight: 700; transition: 0.3s; }
        .btn-focus:hover { transform: scale(1.05); background: #2980b9; }

        .options-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 15px; margin: 25px 0; }
        .opt-btn { padding: 20px; border: 2px solid #f1f3f5; border-radius: 12px; background: #fff; cursor: pointer; transition: 0.2s; font-size: 1.05rem; }
        .opt-btn:hover { border-color: var(--accent-color); background: #f9fbff; }
        .opt-btn.correct { background: #27ae60 !important; color: white; border-color: #27ae60; }
        .opt-btn.wrong { background: #e74c3c !important; color: white; border-color: #e74c3c; }

        .rule-card { background: #e8f4fd; border-radius: 15px; padding: 25px; margin-top: 30px; line-height: 1.7; color: #34495e; border: 1px dashed var(--accent-color); }
        #visitor-counter { position: fixed; bottom: 20px; left: 20px; background: rgba(0,0,0,0.85); padding: 8px 18px; border-radius: 30px; color: white; font-size: 12px; font-weight: 500; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="focus-timer-box">
        ⏳ <span class="timer-val" id="timer-display">25:00</span>
        <button class="btn-focus" id="focus-ctrl" onclick="toggleFocus()">開始專注</button>
    </div>

    <nav id="sidebar">
        <div class="sidebar-header" onclick="showHome()">
            <h2>RunningMath_33</h2>
            <small style="opacity:0.5; color:#fff;">方紋衫數學 2.0 專業版</small>
        </div>
        <div class="unit-list" id="unit-list"></div>
        <div style="padding:25px; border-top:1px solid #333; background: #111;">
            <button class="btn-focus" style="width:100%; border:1px solid var(--accent-color);" onclick="alert('專注模式已在右上方就緒！')">進入專注模式</button>
        </div>
    </nav>

    <main id="main-content">
        <div id="display-area"></div>
    </main>

    <div id="visitor-counter">
        累積人氣：
        <img src="https://hits.dwyl.com/plaidfunction1010/RM_33.svg" alt="Hits" style="vertical-align: middle;">
    </div>

    <script>
        const sheetCsvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRJbN35V8s8IEgl2N1EjFa65gvHLlTxmHJgOn-JA55isj9v5ka-VqWbHT2cy435g5d85S6BneVtE1fk/pub?output=csv'; 
        let allData = [];

        async function init() {
            Papa.parse(sheetCsvUrl, {
                download: true, header: true,
                complete: function(results) {
                    allData = results.data.filter(r => r['單元名稱']);
                    allData.sort((a, b) => {
                        const numA = parseInt(a['單元名稱'].match(/\d+/)) || 0;
                        const numB = parseInt(b['單元名稱'].match(/\d+/)) || 0;
                        return numA - numB;
                    });
                    renderSidebar();
                    showHome();
                }
            });
        }

        function renderSidebar() {
            const container = document.getElementById('unit-list');
            const unitMap = {};
            allData.forEach(p => {
                const u = p['單元名稱'];
                const sub = p['主題'] || '核心概念';
                if (!unitMap[u]) unitMap[u] = new Set();
                unitMap[u].add(sub);
            });

            container.innerHTML = Object.keys(unitMap).map(unit => `
                <div class="unit-group">
                    <div class="unit-title" onclick="toggleSubMenu(this)">
                        ${unit} <span class="arrow">▸</span>
                    </div>
                    <div class="sub-item-list">
                        ${Array.from(unitMap[unit]).map(sub => `<div class="sub-item" onclick="loadContent('${unit}', '${sub}')">${sub}</div>`).join('')}
                    </div>
                </div>
            `).join('');
        }

        function toggleSubMenu(el) {
            const sub = el.nextElementSibling;
            const arrow = el.querySelector('.arrow');
            const isOpen = sub.style.display === 'block';
            sub.style.display = isOpen ? 'none' : 'block';
            arrow.innerHTML = isOpen ? '▸' : '▾';
        }

        function showHome() {
            const area = document.getElementById('display-area');
            const newest = [...allData].sort((a, b) => new Date(b['新增日期']) - new Date(a['新增日期'])).slice(0, 5);

            area.innerHTML = `
                <div class="home-section">
                    <h1 style="font-size:2.8rem; color:#2c3e50;">Hello, plaidfunction1010</h1>
                    <p style="color:#7f8c8d; font-size:1.1rem; margin-bottom:50px;">RunningMath_33 致力於打造最高效的數學學習戰境。</p>
                    
                    <div class="section-title">✨ 最新更新題目 (快速入口)</div>
                    <div id="new-items" style="display:grid; gap:15px; margin-bottom:50px;">
                        ${newest.map(p => `
                            <div class="card" onclick="loadContent('${p['單元名稱']}', '${p['主題']}')" style="cursor:pointer; padding:20px; display:flex; justify-content:space-between; align-items:center;">
                                <div>
                                    <span style="color:var(--accent-color); font-weight:bold;">[${p['單元名稱']}]</span> ${p['主題']}
                                </div>
                                <small style="color:#999;">${p['新增日期']}</small>
                            </div>
                        `).join('')}
                    </div>

                    <div class="section-title">🏰 RM_33 遊戲規則 (新手手冊)</div>
                    <div class="rule-card">
                        <p><strong>1. 專注採集：</strong>開啟右上方「專注模式」，每次倒數 25 分鐘。完成後可獲得 <b>1 個「神聖石材」</b>。</p>
                        <p><strong>2. 解題精煉：</strong>每答對 3 題，可獲得 <b>1 枚「方紋金幣」</b>。</p>
                        <p><strong>3. 城鎮建設：</strong>在未來的 2.5 版本中，你可以使用石材與金幣興建你的「數學王國」。</p>
                        <p style="color:#e67e22;"><i>※ 注意：專注期間若離開網頁或關閉分頁，植物會枯萎，石材將會損毀喔！</i></p>
                    </div>
                </div>
            `;
        }

        function loadContent(unitName, subName) {
            const area = document.getElementById('display-area');
            const problems = allData.filter(d => d['單元名稱'] === unitName && (d['主題'] || '核心概念') === subName);
            area.innerHTML = `<h1 class="section-title">${unitName} > ${subName}</h1>`;
            
            problems.forEach((p, idx) => {
                const raw = p['題目內容，可輸入 LaTeX'] || '';
                const img = p['圖片網址'] || '';
                const qBody = raw.split(/\(\d\)/)[0];
                const opts = raw.match(/\(\d\)[^(]*/g) || [];

                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div style="color:#bbb; font-size:0.75rem; margin-bottom:15px;">Unique ID: ${p['題目ID'] || 'N/A'}</div>
                    ${img ? `<img src="${img}" class="problem-img">` : ''}
                    <div class="problem-text">${qBody}</div>
                    <div class="options-grid">${opts.map(o => {
                        const n = o.match(/\((\d)\)/)[1];
                        return `<div class="opt-btn" onclick="checkChoice(this, '${n}', '${p['答案']}')">${o}</div>`;
                    }).join('')}</div>
                `;
                area.appendChild(card);
            });
            renderMathInElement(area, { delimiters: [{left: "$$", right: "$$", display: true}, {left: "$", right: "$", display: false}, {left: "\\(", right: "\\)", display: false}], throwOnError: false });
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function checkChoice(btn, chosen, correct) {
            const ans = correct.replace(/[^0-9]/g, '');
            if(chosen === ans) {
                btn.classList.add('correct');
            } else {
                btn.classList.add('wrong');
                setTimeout(() => btn.classList.remove('wrong'), 500);
            }
        }

        let timer;
        let timeLeft = 1500;
        function toggleFocus() {
            const btn = document.getElementById('focus-ctrl');
            if(btn.innerText === "開始專注") {
                btn.innerText = "棄賽";
                timer = setInterval(() => {
                    timeLeft--;
                    updateTimerDisplay();
                    if(timeLeft <= 0) {
                        clearInterval(timer);
                        alert("🎉 專注完成！獲得 1 個神聖石材！");
                        btn.innerText = "開始專注";
                        timeLeft = 1500;
                        updateTimerDisplay();
                    }
                }, 1000);
            } else {
                if(confirm("確定要放棄這段專注時間嗎？建築進度會歸零喔！")) {
                    clearInterval(timer);
                    btn.innerText = "開始專注";
                    timeLeft = 1500;
                    updateTimerDisplay();
                }
            }
        }
        function updateTimerDisplay() {
            const m = Math.floor(timeLeft / 60);
            const s = timeLeft % 60;
            document.getElementById('timer-display').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
        }

        init();
    </script>
</body>
</html>
