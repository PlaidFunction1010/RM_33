<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>方紋衫數學 2.0 | RunningMath_33</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        :root { 
            --sidebar-width: 300px; 
            --sidebar-gradient: linear-gradient(135deg, #1a1a1a 0%, #000000 100%);
            --accent-color: #3498db; 
            --card-bg: #ffffff;
        }

        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            margin: 0; display: flex; height: 100vh; background-color: #f8f9fa;
            -webkit-user-select: none; user-select: none; overflow: hidden;
        }

        /* 側邊欄：深色質感 */
        #sidebar { 
            width: var(--sidebar-width); background: var(--sidebar-gradient); 
            color: white; display: flex; flex-direction: column; z-index: 100; box-shadow: 4px 0 15px rgba(0,0,0,0.5); 
        }
        .sidebar-header { padding: 45px 20px; text-align: center; border-bottom: 1px solid #333; cursor: pointer; }
        .sidebar-header h2 { margin: 0; font-size: 1.3rem; color: var(--accent-color); letter-spacing: 1px; }

        /* 帳號區域 */
        .user-auth-area { padding: 25px; border-bottom: 1px solid #333; text-align: center; background: rgba(255,255,255,0.03); }
        .user-name-tag { font-size: 0.9rem; margin-bottom: 12px; color: #eee; font-weight: 500; }
        .btn-auth { background: #fff; color: #333; border: none; padding: 10px 20px; border-radius: 25px; cursor: pointer; font-weight: bold; width: 80%; transition: 0.3s; }
        .btn-auth:hover { background: var(--accent-color); color: white; }

        /* 單元列表 */
        .unit-list { flex-grow: 1; overflow-y: auto; }
        .unit-group { border-bottom: 1px solid #222; }
        .unit-title { padding: 18px 25px; cursor: pointer; display: flex; justify-content: space-between; font-size: 0.95rem; color: #bbb; transition: 0.2s; }
        .unit-title:hover { color: white; background: rgba(255,255,255,0.05); }
        .sub-item-list { display: none; background: #050505; }
        .sub-item { padding: 12px 45px; font-size: 0.85rem; color: #666; cursor: pointer; transition: 0.2s; }
        .sub-item:hover { color: var(--accent-color); background: #111; }

        /* 主內容 */
        #main-content { flex-grow: 1; padding: 50px; overflow-y: auto; scroll-behavior: smooth; }
        .section-title { font-size: 1.5rem; margin-bottom: 25px; border-left: 6px solid var(--accent-color); padding-left: 18px; color: #2c3e50; font-weight: 700; }
        .card { background: white; padding: 30px; border-radius: 18px; box-shadow: 0 5px 25px rgba(0,0,0,0.03); margin-bottom: 30px; border: 1px solid #eee; }
        
        /* 歷史紀錄卡片 */
        .history-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 50px; }
        .history-card { background: #e8f4fd; border: 1px solid #d0e7f9; padding: 20px; border-radius: 12px; cursor: pointer; transition: 0.2s; }
        .history-card:hover { transform: translateY(-5px); box-shadow: 0 5px 15px rgba(52, 152, 219, 0.2); }

        #visitor-counter { position: fixed; bottom: 20px; right: 20px; background: rgba(0,0,0,0.7); padding: 8px 18px; border-radius: 30px; color: white; font-size: 12px; z-index: 1001; }
        .options-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 12px; margin-top: 25px; }
        .opt-btn { padding: 18px; border: 2px solid #f1f3f5; border-radius: 12px; cursor: pointer; background: #fff; }
        .opt-btn.correct { background: #27ae60 !important; color: white; }
    </style>
</head>
<body oncontextmenu="return false;">

    <nav id="sidebar">
        <div class="sidebar-header" onclick="showHome()">
            <h2>RunningMath_33</h2>
            <small style="color:var(--accent-color); letter-spacing:1px; font-weight:700;">方紋衫數學 2.0</small>
        </div>

        <div class="user-auth-area">
            <div id="user-info-box" style="display: none;">
                <div class="user-name-tag">你好, <span id="user-display-name"></span></div>
                <button class="btn-auth" onclick="logout()" style="background:#eee; font-size:0.7rem;">登出帳號</button>
            </div>
            <div id="login-box">
                <button class="btn-auth" onclick="login()">使用 Google 登入</button>
            </div>
        </div>

        <div class="unit-list" id="unit-list"></div>
    </nav>

    <main id="main-content">
        <div id="display-area"></div>
    </main>

    <div id="visitor-counter">
        累積人氣：
        <img src="https://hits.dwyl.com/plaidfunction1010/RM_33.svg" alt="Hits" style="vertical-align: middle;">
    </div>

    <script>
        // ---------------------------------------------------------
        // 【1. Firebase 設定區】 - 請在此替換成你自己的金鑰
        // ---------------------------------------------------------
        const firebaseConfig = {
  apiKey: "AIzaSyA2J4ZISTM1Xb-8bW1Wt1YrFhJ5DXhmvjY",
  authDomain: "runningmath-33.firebaseapp.com",
  projectId: "runningmath-33",
  storageBucket: "runningmath-33.firebasestorage.app",
  messagingSenderId: "384743994340",
  appId: "1:384743994340:web:3d84cc7f2ca410dff64df1",
  measurementId: "G-ZMMX4MQCB8"
};
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const provider = new firebase.auth.GoogleAuthProvider();

        // ---------------------------------------------------------
        // 【2. 資料與狀態】
        // ---------------------------------------------------------
        const sheetCsvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRJbN35V8s8IEgl2N1EjFa65gvHLlTxmHJgOn-JA55isj9v5ka-VqWbHT2cy435g5d85S6BneVtE1fk/pub?output=csv'; 
        let allData = [];
        let currentUser = null;
        let recentPractices = []; // 存放最近 3 個單元名稱

        async function init() {
            Papa.parse(sheetCsvUrl, {
                download: true, header: true,
                complete: function(results) {
                    allData = results.data.filter(r => r['單元名稱']);
                    allData.sort((a, b) => (parseInt(a['單元名稱'].match(/\d+/)) || 0) - (parseInt(b['單元名稱'].match(/\d+/)) || 0));
                    renderSidebar();
                    showHome();
                }
            });

            auth.onAuthStateChanged(user => {
                if (user) {
                    currentUser = user;
                    document.getElementById('user-info-box').style.display = 'block';
                    document.getElementById('login-box').style.display = 'none';
                    document.getElementById('user-display-name').innerText = user.displayName;
                    loadPracticeHistory();
                } else {
                    currentUser = null;
                    document.getElementById('user-info-box').style.display = 'none';
                    document.getElementById('login-box').style.display = 'block';
                    recentPractices = [];
                    showHome();
                }
            });
        }

        // Firebase 邏輯
        function login() { auth.signInWithPopup(provider); }
        function logout() { auth.signOut().then(() => location.reload()); }

        // 儲存練習紀錄
        async function updatePracticeHistory(unitName) {
            if (!currentUser) return;
            
            // 邏輯：將單元移至最前，保持 3 個
            let newHistory = [unitName, ...recentPractices.filter(u => u !== unitName)].slice(0, 3);
            
            await db.collection("users").doc(currentUser.uid).set({
                recentHistory: newHistory,
                lastSeen: new Date()
            }, { merge: true });
            
            recentPractices = newHistory;
        }

        // 讀取練習紀錄
        function loadPracticeHistory() {
            if (!currentUser) return;
            db.collection("users").doc(currentUser.uid).get().then(doc => {
                if (doc.exists) {
                    recentPractices = doc.data().recentHistory || [];
                    showHome();
                }
            });
        }

        // UI 渲染
        function renderSidebar() {
            const container = document.getElementById('unit-list');
            const unitMap = {};
            allData.forEach(p => {
                const u = p['單元名稱'];
                const sub = p['主題'] || '核心概念';
                if (!unitMap[u]) unitMap[u] = new Set();
                unitMap[u].add(sub);
            });
            container.innerHTML = Object.keys(unitMap).map(unit => `
                <div class="unit-group">
                    <div class="unit-title" onclick="toggleSubMenu(this)">${unit} <span>▸</span></div>
                    <div class="sub-item-list">
                        ${Array.from(unitMap[unit]).map(sub => `<div class="sub-item" onclick="loadContent('${unit}', '${sub}')">${sub}</div>`).join('')}
                    </div>
                </div>
            `).join('');
        }

        function toggleSubMenu(el) {
            const sub = el.nextElementSibling;
            sub.style.display = (sub.style.display === 'block') ? 'none' : 'block';
            el.querySelector('span').innerHTML = (sub.style.display === 'block') ? '▾' : '▸';
        }

        function showHome() {
            const area = document.getElementById('display-area');
            const newest = [...allData].sort((a, b) => new Date(b['新增日期']) - new Date(a['新增日期'])).slice(0, 3);

            area.innerHTML = `
                <h1 class="section-title">你好, ${currentUser ? currentUser.displayName : 'plaidfunction1010'}</h1>
                
                ${currentUser && recentPractices.length > 0 ? `
                    <div class="section-title">📍 最近練習的單元</div>
                    <div class="history-grid">
                        ${recentPractices.map(unit => `
                            <div class="history-card" onclick="loadFirstSubOfUnit('${unit}')">
                                <strong>${unit}</strong><br>
                                <small style="color:#666;">點擊繼續複習</small>
                            </div>
                        `).join('')}
                    </div>
                ` : ''}

                <div class="section-title">✨ 最新更新題目</div>
                <div style="display:grid; gap:15px; margin-bottom:40px;">
                    ${newest.map(p => `
                        <div class="card" onclick="loadContent('${p['單元名稱']}', '${p['主題']}')" style="cursor:pointer; padding:20px; display:flex; justify-content:space-between; align-items:center; border-left:5px solid var(--accent-color);">
                            <div><b>[${p['單元名稱']}]</b> ${p['主題']}</div>
                            <small style="color:#999;">${p['新增日期']}</small>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        // 輔助功能：從歷史紀錄點擊後載入該單元內容
        function loadFirstSubOfUnit(unitName) {
            const firstProb = allData.find(d => d['單元名稱'] === unitName);
            if(firstProb) loadContent(unitName, firstProb['主題'] || '核心概念');
        }

        function loadContent(unitName, subName) {
            updatePracticeHistory(unitName); // 觸發 Firebase 儲存紀錄
            
            const area = document.getElementById('display-area');
            const problems = allData.filter(d => d['單元名稱'] === unitName && (d['主題'] || '核心概念') === subName);
            area.innerHTML = `<h1 class="section-title">${unitName} > ${subName}</h1>`;
            
            problems.forEach((p, idx) => {
                const raw = p['題目內容，可輸入 LaTeX'] || '';
                const img = p['圖片網址'] || '';
                const qBody = raw.split(/\(\d\)/)[0];
                const opts = raw.match(/\(\d\)[^(]*/g) || [];

                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div style="color:#bbb; font-size:0.75rem; margin-bottom:15px;">ID: ${p['題目ID']}</div>
                    ${img ? `<img src="${img}" style="width:100%; max-height:400px; object-fit:contain; margin-bottom:20px; border-radius:10px;">` : ''}
                    <div class="problem-text">${qBody}</div>
                    <div class="options-grid">
                        ${opts.map(o => {
                            const n = o.match(/\((\d)\)/)[1];
                            return `<div class="opt-btn" onclick="checkChoice(this, '${n}', '${p['答案']}')">${o}</div>`;
                        }).join('')}
                    </div>
                `;
                area.appendChild(card);
            });
            renderMathInElement(area, { delimiters: [{left: "$$", right: "$$", display: true}, {left: "$", right: "$", display: false}, {left: "\\(", right: "\\)", display: false}], throwOnError: false });
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function checkChoice(btn, chosen, correct) {
            const ans = correct.replace(/[^0-9]/g, '');
            if(chosen === ans) {
                btn.classList.add('correct');
            } else {
                btn.style.background = '#ff7675';
                setTimeout(() => btn.style.background = '#fff', 500);
            }
        }

        init();
    </script>
</body>
</html>
