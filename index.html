<style>
    /* ... 保留之前的 CSS ... */

    /* 💡 建築物樣式修正：從方塊改為圖片 */
    .building { 
        position: absolute; 
        width: 60px;  /* 稍微大一點比較好點擊 */
        height: auto; 
        /* 關鍵：等距視角的圖片需要微調位置，讓底部對準格子 */
        transform: translate(-50%, -100%) rotateZ(-45deg) rotateX(-60deg); 
        transform-origin: bottom center;
        filter: drop-shadow(-5px 5px 5px rgba(0,0,0,0.2));
        pointer-events: none; /* 讓圖片不影響點擊底下的格子 */
        z-index: 10;
    }
</style>

<script>
    // ... 保留之前的 init 與其他邏輯 ...

    // 💡 修正後的蓋房子函數
    function buildHouse() {
        if(stoneCount < 1) { 
            alert("石材不足！請先開始專注採集。"); 
            return; 
        }
        
        stoneCount--;
        document.getElementById('stone-val').innerText = stoneCount;
        
        const scene = document.getElementById('iso-scene');
        const houseImg = document.createElement('img');
        
        // 這裡換成你上傳到 GitHub images 資料夾的圖片網址
        // 或者是我們測試用的這張小房子
        houseImg.src = 'https://cdn-icons-png.flaticon.com/512/619/619153.png'; 
        houseImg.className = 'building';
        
        // 隨機計算格子位置 (8x8)
        const gridX = Math.floor(Math.random() * 8);
        const gridY = Math.floor(Math.random() * 8);
        
        const posX = gridX * 40 + 20;
        const posY = gridY * 40 + 20;
        
        houseImg.style.left = posX + 'px';
        houseImg.style.top = posY + 'px';
        
        scene.appendChild(houseImg);
    }
</script>
